---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # The pixi workspace only supports macOS (osx-64 / osx-arm64), so CI must
    # run on macOS. macos-13 is Intel (osx-64); macos-14 is Apple Silicon
    # (osx-arm64). setup-pixi auto-detects the host platform.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: latest
          manifest-path: pyproject.toml
      - name: Run Format and Lint Checks
        run: |
          pixi run ruff check .
          pixi run ruff format --check .
      - name: Run tests
        run: pixi run test
